<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Amore infinito</title>
  <link href="/src/style.css" rel="stylesheet">
</head>

<body>

  <div class="flex justify-center items-center min-h-screen">
    <div class="flex flex-col items-center gap-6 p-8 rounded-lg shadow-lg bg-white border border-red-200 max-w-md">
      <h1 class="text-center font-bold text-3xl text-red-500">{{francyperry}}</h1>
      <button (click)="pisuClick()" [disabled]="btnCheck"
        class="text-center bg-red-500 hover:bg-red-700 text-white font-bold py-2 px-6 rounded-lg transition duration-200 transform hover:scale-105">
        {{btnCheck ? "Pisu Disabilitato" : "Pisu"}}
      </button>
    </div>
  </div>

</body>


</html>
